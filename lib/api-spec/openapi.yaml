openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SahaayX — Smart Resource Allocation & Volunteer Coordination Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: volunteers
    description: Volunteer management
  - name: ngos
    description: NGO and organization management
  - name: missions
    description: Mission and task management
  - name: resources
    description: Resource allocation
  - name: reports
    description: Reports and analytics
  - name: dashboard
    description: Dashboard summaries
  - name: gemini
    description: Gemini AI chat and image operations
  - name: anthropic
    description: Anthropic AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /volunteers:
    get:
      operationId: listVolunteers
      tags: [volunteers]
      summary: List volunteers
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: skill
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of volunteers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Volunteer"
    post:
      operationId: createVolunteer
      tags: [volunteers]
      summary: Register a volunteer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVolunteerBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"

  /volunteers/{id}:
    get:
      operationId: getVolunteer
      tags: [volunteers]
      summary: Get volunteer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Volunteer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"
        "404":
          description: Not found
    put:
      operationId: updateVolunteer
      tags: [volunteers]
      summary: Update volunteer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVolunteerBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"

  /volunteers/{id}/qr:
    get:
      operationId: getVolunteerQr
      tags: [volunteers]
      summary: Get volunteer QR code data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: QR data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolunteerQrData"

  /ngos:
    get:
      operationId: listNgos
      tags: [ngos]
      summary: List NGOs
      responses:
        "200":
          description: List of NGOs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ngo"
    post:
      operationId: createNgo
      tags: [ngos]
      summary: Register an NGO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNgoBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ngo"

  /ngos/{id}:
    get:
      operationId: getNgo
      tags: [ngos]
      summary: Get NGO by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: NGO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ngo"

  /missions:
    get:
      operationId: listMissions
      tags: [missions]
      summary: List missions
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of missions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mission"
    post:
      operationId: createMission
      tags: [missions]
      summary: Create a new mission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMissionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"

  /missions/{id}:
    get:
      operationId: getMission
      tags: [missions]
      summary: Get mission by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"
    put:
      operationId: updateMission
      tags: [missions]
      summary: Update mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMissionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"

  /missions/{id}/assign:
    post:
      operationId: assignVolunteerToMission
      tags: [missions]
      summary: Assign a volunteer to a mission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignVolunteerBody"
      responses:
        "200":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissionAssignment"

  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: List resources
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    post:
      operationId: createResource
      tags: [resources]
      summary: Create a resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResourceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /resources/{id}:
    put:
      operationId: updateResource
      tags: [resources]
      summary: Update resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResourceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List impact reports
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImpactReport"
    post:
      operationId: createReport
      tags: [reports]
      summary: Submit an incident/impact report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactReport"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get report by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactReport"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get platform-wide dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent platform activity
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/district-stats:
    get:
      operationId: getDistrictStats
      tags: [dashboard]
      summary: Get mission and volunteer stats by district
      responses:
        "200":
          description: District statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DistrictStat"

  /gemini/conversations:
    get:
      operationId: listGeminiConversations
      tags: [gemini]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiConversation"
    post:
      operationId: createGeminiConversation
      tags: [gemini]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGeminiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversation"

  /gemini/conversations/{id}:
    get:
      operationId: getGeminiConversation
      tags: [gemini]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"
    delete:
      operationId: deleteGeminiConversation
      tags: [gemini]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"

  /gemini/conversations/{id}/messages:
    get:
      operationId: listGeminiMessages
      tags: [gemini]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiMessage"
    post:
      operationId: sendGeminiMessage
      tags: [gemini]
      summary: Send a message (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendGeminiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /gemini/analyze-survey:
    post:
      operationId: analyzeCommunitySurvey
      tags: [gemini]
      summary: Analyze community survey CSV data with Gemini
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeSurveyBody"
      responses:
        "200":
          description: Survey analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyAnalysisResult"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"

  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"

  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /anthropic/match-volunteers:
    post:
      operationId: matchVolunteers
      tags: [anthropic]
      summary: Use Claude to match volunteers to a mission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchVolunteersBody"
      responses:
        "200":
          description: Matching result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchVolunteersResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          enum: [volunteer, ngo_admin, government, police, academic]
      required:
        - name
        - email
        - password
        - role

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - createdAt

    Volunteer:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        district:
          type: string
        skills:
          type: array
          items:
            type: string
        availability:
          type: string
        status:
          type: string
          enum: [active, inactive, deployed]
        totalHours:
          type: number
        missionsCompleted:
          type: integer
        badge:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - district
        - skills
        - status
        - totalHours
        - missionsCompleted
        - createdAt

    CreateVolunteerBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        district:
          type: string
        skills:
          type: array
          items:
            type: string
        availability:
          type: string
      required:
        - name
        - email
        - district
        - skills

    UpdateVolunteerBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        district:
          type: string
        skills:
          type: array
          items:
            type: string
        availability:
          type: string
        status:
          type: string

    VolunteerQrData:
      type: object
      properties:
        volunteerId:
          type: integer
        name:
          type: string
        district:
          type: string
        skills:
          type: array
          items:
            type: string
        badge:
          type: string
        qrPayload:
          type: string
      required:
        - volunteerId
        - name
        - district
        - skills
        - qrPayload

    Ngo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        registrationNumber:
          type: string
        district:
          type: string
        category:
          type: string
        contactEmail:
          type: string
        phone:
          type: string
        activeVolunteers:
          type: integer
        totalMissions:
          type: integer
        status:
          type: string
          enum: [active, suspended, pending]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - district
        - category
        - contactEmail
        - status
        - createdAt

    CreateNgoBody:
      type: object
      properties:
        name:
          type: string
        registrationNumber:
          type: string
        district:
          type: string
        category:
          type: string
        contactEmail:
          type: string
        phone:
          type: string
      required:
        - name
        - district
        - category
        - contactEmail

    Mission:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        district:
          type: string
        urgency:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, active, completed, cancelled]
        requiredSkills:
          type: array
          items:
            type: string
        volunteersNeeded:
          type: integer
        volunteersAssigned:
          type: integer
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        ngoId:
          type: integer
        ngoName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - category
        - district
        - urgency
        - status
        - requiredSkills
        - volunteersNeeded
        - volunteersAssigned
        - createdAt

    CreateMissionBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        district:
          type: string
        urgency:
          type: string
          enum: [low, medium, high, critical]
        requiredSkills:
          type: array
          items:
            type: string
        volunteersNeeded:
          type: integer
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        ngoId:
          type: integer
      required:
        - title
        - category
        - district
        - urgency
        - requiredSkills
        - volunteersNeeded

    UpdateMissionBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        urgency:
          type: string
        status:
          type: string
        volunteersNeeded:
          type: integer

    AssignVolunteerBody:
      type: object
      properties:
        volunteerId:
          type: integer
      required:
        - volunteerId

    MissionAssignment:
      type: object
      properties:
        missionId:
          type: integer
        volunteerId:
          type: integer
        assignedAt:
          type: string
          format: date-time
      required:
        - missionId
        - volunteerId
        - assignedAt

    Resource:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum: [medical, food, shelter, transport, equipment, manpower]
        district:
          type: string
        quantity:
          type: integer
        unit:
          type: string
        status:
          type: string
          enum: [available, allocated, depleted]
        allocatedToMissionId:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - category
        - district
        - quantity
        - unit
        - status
        - createdAt

    CreateResourceBody:
      type: object
      properties:
