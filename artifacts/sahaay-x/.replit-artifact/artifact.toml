kind = "web"
previewPath = "/"
title = "SahaayX"
version = "1.0.0"
id = "artifacts/sahaay-x"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18128

[services.development]
run = "pnpm --filter @workspace/sahaay-x run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sahaay-x", "run", "build" ]
publicDir = "artifacts/sahaay-x/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18128"
BASE_PATH = "/"
